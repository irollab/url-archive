<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>剪藏到 Obsidian</title>
    <meta name="manifest.type" content="browser_action" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="panel">
      <header class="topbar">
        <div>
          <h1>URL Archive</h1>
          <p id="stats" class="stats">正在读取收藏...</p>
        </div>
        <button id="importBookmarks" class="ghost" type="button">导入书签</button>
      </header>

      <section class="capture">
        <textarea id="why" placeholder="为什么留它？（可选）" rows="2"></textarea>
        <button id="clip" class="primary" type="button">剪藏当前网页</button>
        <p id="status" class="status"></p>
      </section>

      <section id="revisit" class="revisit" hidden>
        <div class="revisit-head">
          <span>回访一条收藏</span>
          <span id="revisitMeta" class="revisit-meta"></span>
        </div>
        <button id="revisitOpen" class="revisit-open" type="button">
          <span id="revisitTitle"></span>
          <small id="revisitSummary"></small>
        </button>
      </section>

      <section class="search">
        <input id="search" type="search" placeholder="搜索标题、标签、摘要、文件夹、备注、URL" autocomplete="off" />
        <div class="filters" aria-label="收藏筛选">
          <button type="button" class="filter active" data-filter="all">全部</button>
          <button type="button" class="filter" data-filter="clip">剪藏</button>
          <button type="button" class="filter" data-filter="bookmark">书签</button>
          <button type="button" class="filter" data-filter="unvisited">未回访</button>
        </div>
        <section id="categoryNav" class="category-nav" hidden>
          <div class="category-head">
            <button id="categoryBack" class="category-back" type="button">上级</button>
            <span id="categoryCrumb" class="category-crumb">全部书签分类</span>
          </div>
          <div id="categoryGrid" class="category-grid"></div>
        </section>
        <div id="searchResults" class="search-results"></div>
      </section>

      <section id="editPanel" class="edit-panel" hidden>
        <div class="edit-head">
          <strong>编辑收藏</strong>
          <button id="editClose" class="icon-button" type="button" aria-label="关闭编辑">×</button>
        </div>
        <input id="editTitle" type="text" placeholder="标题" />
        <input id="editFolder" type="text" placeholder="分类，例如：书签栏 / 工作 / AI" />
        <input id="editTags" type="text" placeholder="标签，用逗号分隔" />
        <textarea id="editWhy" rows="2" placeholder="备注"></textarea>
        <div class="edit-actions">
          <button id="editSave" class="primary" type="button">保存</button>
          <button id="editCancel" class="ghost" type="button">取消</button>
        </div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
