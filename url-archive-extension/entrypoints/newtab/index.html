<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Archive</title>
    <meta name="manifest.type" content="newtab" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main id="app" class="newtab density-large theme-light">
      <div class="wallpaper" aria-hidden="true"></div>
      <div class="scrim" aria-hidden="true"></div>

      <header class="topbar">
        <button class="brand" type="button" aria-label="回到全部收藏">
          <span class="brand-mark"><img src="/icon/IROLLAB_dark.svg" alt="" /></span>
          <span>URL Archive</span>
        </button>
        <section id="status" class="status" aria-live="polite"></section>
        <div class="topbar-actions">
          <button id="themeToggle" class="icon-tool" type="button" aria-label="切换主题" title="切换主题">
            <svg class="theme-icon-light" aria-hidden="true" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg class="theme-icon-dark" aria-hidden="true" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button id="settingsToggle" class="icon-tool" type="button" aria-label="设置" title="设置">
            <svg aria-hidden="true" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 8.92 4a1.65 1.65 0 0 0 1-1.51V2a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.14.3.22.63.22 1H21a2 2 0 1 1 0 4h-1.38c0 .37-.08.7-.22 1Z"/></svg>
          </button>
        </div>
      </header>

      <section class="stage" aria-label="新标签页">
        <form id="webSearchForm" class="search-shell" role="search">
          <button id="searchEngineToggle" class="engine-button" type="button" title="切换搜索引擎" aria-haspopup="listbox" aria-expanded="false">G</button>
          <input id="searchInput" class="search" type="search" placeholder="搜索网页或收藏" autocomplete="off" />
          <button class="search-submit" type="submit" aria-label="网页搜索">⌕</button>
        </form>

        <section class="content">
          <div class="content-head">
            <div>
              <div id="contentTitle" class="content-title">全部收藏</div>
              <p id="contentHint" class="content-hint">常用收藏会在这里快速打开，输入关键词可即时筛选。</p>
            </div>
            <button id="aiRecall" class="glass-button" type="button">AI 找回</button>
          </div>
          <div class="bookmark-grid-viewport" id="cardsViewport">
            <div id="cards" class="bookmark-grid"></div>
          </div>
          <div id="domeGallery" class="dome-gallery" hidden></div>
          <div id="pageIndicator" class="page-indicator" aria-label="分页"></div>
        </section>
      </section>

      <aside id="rightPanel" class="bookmark-drawer" aria-label="书签">
        <div class="bookmark-drawer-head">
          <div>
            <strong>书签</strong>
            <span>分类与详细书签</span>
          </div>
          <button id="rightDrawerToggle" class="icon-tool subtle" type="button" aria-label="收起书签栏">›</button>
        </div>
        <div class="bookmark-drawer-body">
          <nav class="drawer-category-pane" aria-label="书签分类">
            <div id="categoryList" class="category-list"></div>
          </nav>
          <section class="drawer-detail-pane" aria-label="书签列表">
            <div class="drawer-search">
              <input id="drawerSearchInput" type="search" placeholder="搜索书签" autocomplete="off" />
              <span aria-hidden="true">⌕</span>
            </div>
            <div id="detailList" class="detail-list"></div>
          </section>
        </div>
      </aside>
      <button id="rightDrawerHotspot" class="drawer-hotspot" type="button" aria-label="打开书签栏">‹</button>

      <section class="bottom-dock" aria-label="回访与剪藏">
        <article class="dock-card">
          <h2>今日回访</h2>
          <div id="revisitWidget" class="widget-body"></div>
        </article>
        <article class="dock-card">
          <h2>最近剪藏</h2>
          <div id="recentWidget" class="widget-body"></div>
        </article>
      </section>

      <footer class="newtab-footer" aria-label="版权信息">
        <span>Powered by iRollab</span>
        <span>© 2026 iRollab</span>
        <span class="footer-contact">
          <svg aria-hidden="true" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-10 6L2 7"/></svg>
          Email：th@tancem.cn
        </span>
        <span class="footer-contact">
          <svg aria-hidden="true" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.4 5.4 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
          irollab
        </span>
      </footer>

      <section id="settingsPanel" class="settings-panel" hidden>
        <div class="settings-tabs">
          <strong class="settings-title">设置</strong>
          <button id="settingsClose" class="icon-button" type="button" aria-label="关闭设置">×</button>
        </div>
        <div class="settings-scroll">
          <section class="settings-group">
            <div class="settings-group-head">
              <strong>页面背景</strong>
              <button id="cycleWallpaper" class="mini-action icon-mini-action" type="button" aria-label="切换页面背景" title="切换页面背景">↻</button>
              <button id="clearBackgroundImage" class="mini-action" type="button">恢复</button>
            </div>
            <button id="wallpaperPreview" class="wallpaper-preview" type="button" aria-label="上传页面背景" title="点击上传页面背景"></button>
            <div class="range-field">
              <span>蒙版</span>
              <input id="wallpaperMaskInput" type="range" min="0" max="100" value="58" />
              <output id="wallpaperMaskValue" for="wallpaperMaskInput">58%</output>
            </div>
            <div class="range-field">
              <span>虚化</span>
              <input id="wallpaperBlurInput" type="range" min="0" max="100" value="0" />
              <output id="wallpaperBlurValue" for="wallpaperBlurInput">0%</output>
            </div>
            <input id="backgroundImageFile" type="file" accept="image/*" hidden />
          </section>

          <section class="settings-group">
            <div class="settings-group-head"><strong>显示</strong></div>
            <div class="range-field">
              <span>页面缩放</span>
              <input type="range" min="80" max="120" value="100" />
              <output>100%</output>
            </div>
            <div class="range-field">
              <span>侧边栏比例</span>
              <input type="range" min="80" max="120" value="100" />
              <output>100%</output>
            </div>
            <label class="toggle-field"><span>画廊模式</span><input id="galleryModeInput" type="checkbox" /><span class="toggle-switch" aria-hidden="true"></span></label>
          </section>

          <section class="settings-group">
            <div class="settings-group-head"><strong>布局</strong></div>
            <div class="layout-presets" aria-label="布局预设">
              <button class="layout-preset" type="button" data-columns="4" data-rows="2">2×4</button>
              <button class="layout-preset" type="button" data-columns="5" data-rows="2">2×5</button>
              <button class="layout-preset" type="button" data-columns="6" data-rows="2">2×6</button>
              <button class="layout-preset" type="button" data-columns="7" data-rows="2">2×7</button>
              <button class="layout-preset" type="button" data-columns="3" data-rows="3">3×3</button>
              <button class="layout-preset active" type="button" data-columns="6" data-rows="3">3×6</button>
            </div>
            <div class="range-field">
              <span>单行列数</span>
              <input id="gridColumnsInput" type="range" min="2" max="12" step="1" />
              <output id="gridColumnsValue" for="gridColumnsInput">6</output>
            </div>
            <div class="range-field">
              <span>单页行数</span>
              <input id="gridRowsInput" type="range" min="1" max="8" step="1" />
              <output id="gridRowsValue" for="gridRowsInput">3</output>
            </div>
          </section>

          <section class="settings-group">
            <div class="settings-group-head"><strong>图标</strong></div>
            <label class="toggle-field"><span>隐藏图标名称</span><input id="showLabelsInput" type="checkbox" /><span class="toggle-switch" aria-hidden="true"></span></label>
            <label class="toggle-field"><span>彩色描边光晕</span><input id="iconGlowInput" type="checkbox" /><span class="toggle-switch" aria-hidden="true"></span></label>
            <div class="range-field">
              <span>图标圆角</span>
              <input id="cardRadiusInput" type="range" min="0" max="50" step="1" />
              <output id="cardRadiusValue" for="cardRadiusInput">24</output>
            </div>
            <div class="range-field">
              <span>图标大小</span>
              <input id="iconSizeInput" type="range" min="50" max="150" step="1" />
              <output id="iconSizeValue" for="iconSizeInput">100%</output>
            </div>
            <div class="range-field">
              <span>列间距</span>
              <input id="columnGapInput" type="range" min="0" max="120" step="1" />
              <output id="columnGapValue" for="columnGapInput">42px</output>
            </div>
            <div class="range-field">
              <span>行间距</span>
              <input id="rowGapInput" type="range" min="0" max="120" step="1" />
              <output id="rowGapValue" for="rowGapInput">54px</output>
            </div>
          </section>

          <section class="settings-group">
            <div class="settings-group-head"><strong>搜索框</strong></div>
            <div class="engine-config">
              <div class="engine-config-head">
                <span>搜索引擎</span>
                <span class="engine-config-hint">地址用 %s 表示查询词</span>
              </div>
              <div id="engineList" class="engine-list"></div>
              <button id="addEngine" class="tool wide-action" type="button">+ 添加搜索引擎</button>
              <input id="engineIconFile" type="file" accept="image/*" hidden />
            </div>
            <label class="toggle-field"><span>隐藏搜索框</span><input id="searchBoxVisibleInput" type="checkbox" /><span class="toggle-switch" aria-hidden="true"></span></label>
            <div class="range-field"><span>搜索框大小</span><input id="searchBoxWidthInput" type="range" min="50" max="100" value="75" /><output id="searchBoxWidthValue" for="searchBoxWidthInput">75%</output></div>
            <div class="range-field"><span>搜索框圆角</span><input id="searchBoxRadiusInput" type="range" min="0" max="50" value="9" /><output id="searchBoxRadiusValue" for="searchBoxRadiusInput">9px</output></div>
          </section>

          <section class="settings-group">
            <div class="settings-group-head"><strong>字体</strong></div>
            <label class="edit-field">
              <span>页面显示字体</span>
              <select id="fontFamilyInput" class="font-select">
                <option value="system">默认</option>
                <option value="smiley-sans">得意黑 Smiley Sans</option>
              </select>
            </label>
            <label class="toggle-field"><span>字体阴影</span><input id="fontShadowInput" type="checkbox" checked /><span class="toggle-switch" aria-hidden="true"></span></label>
            <div class="range-field"><span>字体大小</span><input id="fontSizeInput" type="range" min="10" max="18" value="13" /><output id="fontSizeValue" for="fontSizeInput">13</output></div>
          </section>

          <section class="settings-group">
            <div class="settings-group-head"><strong>动画</strong></div>
            <div class="segmented">
              <button class="tool density-button" type="button" data-density="standard">默认</button>
              <button class="tool density-button" type="button" data-density="compact">紧凑</button>
              <button class="tool density-button active" type="button" data-density="large">放大</button>
            </div>
            <button id="resetDefaultPrefs" class="wide-action danger-action" type="button">重置-默认设置</button>
          </section>

          <section class="settings-group">
            <div class="settings-group-head"><strong>插件操作</strong></div>
            <button id="clipCurrent" class="wide-action" type="button">剪藏最近网页</button>
            <button id="importBookmarks" class="wide-action" type="button">导入浏览器书签</button>
            <button id="openSettings" class="wide-action" type="button">打开扩展设置</button>
          </section>
        </div>
      </section>

      <section id="editPanel" class="edit-panel" hidden>
        <div class="edit-head">
          <strong>编辑收藏</strong>
          <button id="editClose" class="icon-button" type="button" aria-label="关闭编辑">×</button>
        </div>
        <label class="edit-field">
          <span>名称</span>
          <input id="editTitle" type="text" placeholder="收藏名称" />
        </label>
        <label class="edit-field">
          <span>收藏夹栏</span>
          <select id="editFolder"></select>
        </label>
        <div class="edit-field">
          <span>图标</span>
          <div class="icon-edit-row">
            <div id="editIconPreview" class="icon-edit-preview"></div>
            <div class="icon-edit-inputs">
              <input id="editFaviconUrl" type="url" placeholder="图标 URL" />
              <input id="editFaviconFile" type="file" accept="image/*" hidden />
              <div class="icon-edit-actions">
                <button id="uploadFavicon" class="tool" type="button">上传</button>
                <button id="editClearFavicon" class="tool" type="button">恢复默认图标</button>
              </div>
            </div>
          </div>
        </div>
        <div class="edit-actions">
          <button id="editSave" class="tool primary" type="button">保存</button>
          <button id="editCancel" class="tool" type="button">取消</button>
        </div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
