<!DOCTYPE html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /><title>URL Archive 设置</title></head>
  <body style="font-family: system-ui, sans-serif; max-width: 480px; margin: 24px auto;">
    <h2>URL Archive 设置</h2>
    <fieldset>
      <legend>AI（BYOK）</legend>
      <label>API 端点 <input id="llmBaseUrl" style="width:100%" placeholder="https://open.bigmodel.cn/api/paas/v4" /></label>
      <label>API Key <input id="llmApiKey" type="password" style="width:100%" /></label>
      <label>模型 <input id="llmModel" style="width:100%" placeholder="glm-5.2" /></label>
      <button id="testAi" type="button">测试 AI</button>
      <p id="aiStatus" style="font-size:12px;color:#555;min-height:18px;"></p>
    </fieldset>
    <fieldset>
      <legend>Obsidian 写入方式</legend>
      <label>写入通道
        <select id="vaultTarget" style="width:100%">
          <option value="official">URL Archive 官方插件（推荐，无需额外安装）</option>
          <option value="restApi">Obsidian Local REST API 插件</option>
        </select>
      </label>
      <p style="font-size:12px;color:#555;margin:4px 0 0;">
        选择「官方插件」时，请在 Obsidian 的 URL Archive 插件设置里开启本地服务，并把其 Token 填到下方对应栏位。
      </p>
    </fieldset>
    <fieldset id="officialFields">
      <legend>URL Archive 官方插件</legend>
      <label>地址 <input id="officialApiUrl" style="width:100%" placeholder="http://127.0.0.1:27125" /></label>
      <label>Token <input id="officialApiToken" type="password" style="width:100%" /></label>
    </fieldset>
    <fieldset id="restApiFields">
      <legend>Obsidian Local REST API</legend>
      <label>地址 <input id="restApiUrl" style="width:100%" /></label>
      <label>Token <input id="restApiToken" type="password" style="width:100%" /></label>
    </fieldset>
    <fieldset>
      <legend>通用</legend>
      <label>vault 文件夹 <input id="vaultFolder" style="width:100%" /></label>
    </fieldset>
    <button id="save">保存</button>
    <span id="saved"></span>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
